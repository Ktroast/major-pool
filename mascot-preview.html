<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Major Pool Mascot Preview</title>
<style>
  body {
    background: #1e1528;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    font-family: -apple-system, sans-serif;
    gap: 12px;
  }
  p { color: rgba(255,255,255,0.35); font-size: 13px; margin: 0; }

  @keyframes drift1 {
    0%   { d: path("M197,143 Q192,129 196,114 Q200,99 195,85"); opacity: 0.45; }
    50%  { d: path("M197,143 Q203,129 199,114 Q195,99 200,85"); opacity: 0.3; }
    100% { d: path("M197,143 Q192,129 196,114 Q200,99 195,85"); opacity: 0.45; }
  }
  @keyframes drift2 {
    0%   { d: path("M200,141 Q196,127 199,112 Q202,97 198,83"); opacity: 0.35; }
    50%  { d: path("M200,141 Q204,127 201,112 Q198,97 202,83"); opacity: 0.2; }
    100% { d: path("M200,141 Q196,127 199,112 Q202,97 198,83"); opacity: 0.35; }
  }
  @keyframes drift3 {
    0%   { d: path("M194,140 Q189,126 192,112"); opacity: 0.25; }
    50%  { d: path("M194,140 Q199,126 196,112"); opacity: 0.15; }
    100% { d: path("M194,140 Q189,126 192,112"); opacity: 0.25; }
  }
  .smoke1 { animation: drift1 3.2s ease-in-out infinite; }
  .smoke2 { animation: drift2 2.8s ease-in-out infinite 0.4s; }
  .smoke3 { animation: drift3 2.4s ease-in-out infinite 0.8s; }

  /* Drink */
  .mascot-beer-mug { transform-box: fill-box; transform-origin: right center; animation: mascot-drink-anim 10s ease-in-out infinite; }
  @keyframes mascot-drink-anim {
    0%, 18%, 100% { transform: none; }
    5%            { transform: rotate(28deg); }
    10%           { transform: rotate(36deg); }
    15%           { transform: rotate(22deg); }
  }
  /* Puff ember */
  .mascot-ember-group { transform-box: fill-box; transform-origin: center center; animation: mascot-ember-puff 10s ease-in-out infinite 5s; }
  @keyframes mascot-ember-puff {
    0%, 18%, 100% { transform: scale(1); }
    5%            { transform: scale(1.5); }
    10%           { transform: scale(1.6); }
    15%           { transform: scale(1.2); }
  }
  /* Puff cloud */
  .mascot-puff-cloud { transform-box: fill-box; transform-origin: center bottom; opacity: 0; animation: mascot-puff-cloud-anim 10s ease-in-out infinite 5s; }
  @keyframes mascot-puff-cloud-anim {
    0%, 18%, 100% { opacity: 0;    transform: scale(0.3) translateY(8px); }
    5%            { opacity: 0.65; transform: scale(0.95) translateY(0); }
    10%           { opacity: 0.55; transform: scale(1.1)  translateY(-5px); }
    15%           { opacity: 0.25; transform: scale(1.3)  translateY(-10px); }
    17%           { opacity: 0;    transform: scale(1.4)  translateY(-14px); }
  }
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 275" width="320" height="338">
  <defs>
    <radialGradient id="mg-ball" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="60%"  stop-color="#f3f3ed"/>
      <stop offset="100%" stop-color="#d0d0c6"/>
    </radialGradient>
    <radialGradient id="mg-iris" cx="30%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <radialGradient id="mg-beer" cx="25%" cy="20%" r="80%">
      <stop offset="0%"   stop-color="#f8d870"/>
      <stop offset="100%" stop-color="#c08820"/>
    </radialGradient>
    <clipPath id="mg-clip">
      <circle cx="130" cy="148" r="88"/>
    </clipPath>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="130" cy="248" rx="70" ry="10" fill="#000" opacity="0.15"/>

  <!-- Left arm (holding beer) -->
  <rect x="6" y="162" width="58" height="19" rx="9.5"
        fill="#e4e4db" stroke="#b5b5a5" stroke-width="1.5"
        transform="rotate(14, 35, 171)"/>

  <!-- Beer mug -->
  <g class="mascot-beer-mug" transform="translate(1, 168)">
    <ellipse cx="4"  cy="10" rx="5"   ry="6.5" fill="white" stroke="#ddd" stroke-width="1"/>
    <ellipse cx="12" cy="6"  rx="6"   ry="7.5" fill="white" stroke="#ddd" stroke-width="1"/>
    <ellipse cx="21" cy="7"  rx="6"   ry="7"   fill="white" stroke="#ddd" stroke-width="1"/>
    <ellipse cx="30" cy="10" rx="4.5" ry="6"   fill="white" stroke="#ddd" stroke-width="1"/>
    <rect x="0" y="10" width="34" height="44" rx="4" fill="url(#mg-beer)" stroke="#9a6c12" stroke-width="1.5"/>
    <rect x="5" y="15" width="7"  height="32" rx="3.5" fill="white" opacity="0.18"/>
    <path d="M34,20 Q50,20 50,32 Q50,46 34,46" fill="none" stroke="#9a6c12" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- Right arm -->
  <rect x="196" y="162" width="52" height="19" rx="9.5"
        fill="#e4e4db" stroke="#b5b5a5" stroke-width="1.5"
        transform="rotate(-14, 222, 171)"/>

  <!-- Ball body -->
  <circle cx="130" cy="148" r="88" fill="url(#mg-ball)" stroke="#c2c2ba" stroke-width="1.5"/>

  <!-- Dimples — symmetric grid, clipped to ball -->
  <g clip-path="url(#mg-clip)" fill="none" stroke="#b0b0a8" stroke-width="1" opacity="0.65">
    <!-- y=65  --> <circle cx="112" cy="65"  r="5.5"/> <circle cx="130" cy="65"  r="5.5"/> <circle cx="148" cy="65"  r="5.5"/>
    <!-- y=82  --> <circle cx="93"  cy="82"  r="5.5"/> <circle cx="111" cy="82"  r="5.5"/> <circle cx="130" cy="82"  r="5.5"/> <circle cx="149" cy="82"  r="5.5"/> <circle cx="167" cy="82"  r="5.5"/>
    <!-- y=99  --> <circle cx="76"  cy="99"  r="5.5"/> <circle cx="94"  cy="99"  r="5.5"/> <circle cx="112" cy="99"  r="5.5"/> <circle cx="130" cy="99"  r="5.5"/> <circle cx="148" cy="99"  r="5.5"/> <circle cx="166" cy="99"  r="5.5"/> <circle cx="184" cy="99"  r="5.5"/>
    <!-- y=116 sides only (eye level) --> <circle cx="58"  cy="116" r="5.5"/> <circle cx="76"  cy="116" r="5.5"/> <circle cx="184" cy="116" r="5.5"/> <circle cx="202" cy="116" r="5.5"/>
    <!-- y=133 sides only --> <circle cx="52"  cy="133" r="5.5"/> <circle cx="70"  cy="133" r="5.5"/> <circle cx="190" cy="133" r="5.5"/> <circle cx="208" cy="133" r="5.5"/>
    <!-- y=150 sides only --> <circle cx="50"  cy="150" r="5.5"/> <circle cx="68"  cy="150" r="5.5"/> <circle cx="192" cy="150" r="5.5"/> <circle cx="210" cy="150" r="5.5"/>
    <!-- y=167 sides only (smirk level) --> <circle cx="52"  cy="167" r="5.5"/> <circle cx="70"  cy="167" r="5.5"/> <circle cx="190" cy="167" r="5.5"/> <circle cx="208" cy="167" r="5.5"/>
    <!-- y=184 --> <circle cx="76"  cy="184" r="5.5"/> <circle cx="94"  cy="184" r="5.5"/> <circle cx="112" cy="184" r="5.5"/> <circle cx="130" cy="184" r="5.5"/> <circle cx="148" cy="184" r="5.5"/> <circle cx="166" cy="184" r="5.5"/> <circle cx="184" cy="184" r="5.5"/>
    <!-- y=201 --> <circle cx="94"  cy="201" r="5.5"/> <circle cx="112" cy="201" r="5.5"/> <circle cx="130" cy="201" r="5.5"/> <circle cx="148" cy="201" r="5.5"/> <circle cx="166" cy="201" r="5.5"/>
    <!-- y=215 --> <circle cx="112" cy="215" r="5.5"/> <circle cx="130" cy="215" r="5.5"/> <circle cx="148" cy="215" r="5.5"/>
  </g>

  <!-- Smoke wisps (tip at ~199,146) -->
  <g fill="none" stroke-linecap="round">
    <path class="smoke1" d="M197,143 Q192,129 196,114 Q200,99 195,85" stroke="#aaa" stroke-width="2.5"/>
    <path class="smoke2" d="M200,141 Q196,127 199,112 Q202,97 198,83" stroke="#bbb" stroke-width="1.8"/>
    <path class="smoke3" d="M194,140 Q189,126 192,112" stroke="#ccc" stroke-width="1.3"/>
  </g>

  <!-- Left eye -->
  <ellipse cx="105" cy="126" rx="13" ry="15" fill="white" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="105" cy="128" rx="8.5" ry="10" fill="url(#mg-iris)"/>
  <circle  cx="101" cy="124" r="2.8" fill="white" opacity="0.85"/>
  <path d="M92,119 Q105,113 118,119" fill="#ebebE2" stroke="#bbbba8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Right eye -->
  <ellipse cx="155" cy="126" rx="13" ry="15" fill="white" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="155" cy="128" rx="8.5" ry="10" fill="url(#mg-iris)"/>
  <circle  cx="151" cy="124" r="2.8" fill="white" opacity="0.85"/>
  <path d="M142,119 Q155,113 168,119" fill="#ebebE2" stroke="#bbbba8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Smirk -->
  <path d="M96,160 Q116,176 150,167 Q162,162 166,153"
        fill="none" stroke="#666" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Cigarette: filter at mouth, lit tip at right (~199,146) -->
  <g transform="translate(162, 153) rotate(-10)">
    <rect x="0"  y="-3.5" width="10" height="7" rx="2.5" fill="#c07848" stroke="#a05830" stroke-width="0.8"/>
    <rect x="9"  y="-3.5" width="28" height="7" rx="1.5" fill="#f6f1e8" stroke="#ddd"    stroke-width="0.8"/>
    <g class="mascot-ember-group">
      <circle cx="38" cy="0"  r="5"   fill="#ff4800" opacity="0.85"/>
      <circle cx="38" cy="0"  r="3"   fill="#ff9018"/>
      <circle cx="37" cy="-1" r="1.4" fill="#ffe070" opacity="0.9"/>
    </g>
  </g>
  <!-- Puff cloud -->
  <g class="mascot-puff-cloud">
    <circle cx="213" cy="130" r="11" fill="#c0c0c0"/>
    <circle cx="225" cy="121" r="13" fill="#c0c0c0"/>
    <circle cx="236" cy="126" r="10" fill="#c0c0c0"/>
    <circle cx="227" cy="137" r="11" fill="#c0c0c0"/>
    <circle cx="216" cy="117" r="9"  fill="#c0c0c0"/>
  </g>
</svg>

<p>mascot-preview.html — symmetric dimples, animated smoke + ember</p>
</body>
</html>
